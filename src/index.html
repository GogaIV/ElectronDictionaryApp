<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>App Test</title>
    <link href="./output.css" rel="stylesheet" />
  </head>

  <!-- rgba(0, 0, 0, 0.55) 0px 20px 68px -->

  <body class="m-2.5 bg-[#829db6]">
    <div>
      <div class="">
        <div class="m-2.5 border-2 w-auto bg-[#1b1b1b] rounded-md">
          <input class="w-full text-amber-50 p-1" />
        </div>

        <div>
          <button
            class="hover:bg-[#608fb5] pt-0.5 pb-0.5 pl-3 pr-3 rounded-4xl border-2 cursor-pointer m-2"
          >
            Autocorrect
          </button>
          <button
            class="hover:bg-[#608fb5] pt-0.5 pb-0.5 pl-3 pr-3 rounded-4xl border-2 cursor-pointer m-2"
          >
            Clear
          </button>
        </div>
      </div>

      <div class="flex">
        <div class="m-2.5 border-2 w-auto bg-[#1b1b1b] rounded-md">
          <input id="searchInput" class="w-full text-amber-50 p-1" />
        </div>

        
          <button
            id="searchButton"
            class="hover:bg-[#608fb5] pt-0.5 pb-0.5 pl-3 pr-3 rounded-4xl border-2 cursor-pointer m-2"
          >
            Search
          </button>
        
      </div>

      <div class="border-2 m-1.5 bg-[#1b1b1b] p-3 rounded-md h-[550px]">
        <div id="wordDisplay" class="text-amber-50"></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
